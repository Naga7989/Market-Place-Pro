# =============================================================
# KUBERNETES FRONTEND DEPLOYMENT + SERVICE + HPA
# India-First Enterprise Marketplace Platform
# Next.js Application
# =============================================================

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketplace-frontend
  namespace: marketplace-prod
  labels:
    app.kubernetes.io/name: marketplace-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: kubectl
    app: marketplace-frontend
  annotations:
    description: "Next.js SSR frontend for BazaarIndia marketplace"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: marketplace-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: marketplace-frontend
        app.kubernetes.io/name: marketplace-frontend
        app.kubernetes.io/component: frontend
        version: "1.0.0"
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - marketplace-frontend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: marketplace-frontend
          image: ${ECR_REGISTRY}/marketplace/frontend:${IMAGE_TAG:-latest}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          envFrom:
            - configMapRef:
                name: marketplace-frontend-config
          env:
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: marketplace-app-secret
                  key: nextauth-secret
            - name: NEXT_PUBLIC_RAZORPAY_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: marketplace-payment-secret
                  key: razorpay-key-id
            - name: NEXT_PUBLIC_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: marketplace-oauth-secret
                  key: google-client-id
            - name: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: marketplace-maps-secret
                  key: google-maps-api-key
            - name: NEXT_PUBLIC_FIREBASE_CONFIG
              valueFrom:
                secretKeyRef:
                  name: marketplace-firebase-secret
                  key: firebase-config-json
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 12
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          volumeMounts:
            - name: next-cache
              mountPath: /app/.next/cache
            - name: tmp-dir
              mountPath: /tmp
      volumes:
        - name: next-cache
          emptyDir: {}
        - name: tmp-dir
          emptyDir: {}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      imagePullSecrets:
        - name: ecr-registry-secret

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: marketplace-frontend-service
  namespace: marketplace-prod
  labels:
    app.kubernetes.io/name: marketplace-frontend
    app.kubernetes.io/component: service
spec:
  selector:
    app: marketplace-frontend
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: http
  sessionAffinity: None

---
# Frontend HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: marketplace-frontend-hpa
  namespace: marketplace-prod
  labels:
    app.kubernetes.io/name: marketplace-frontend
    app.kubernetes.io/component: hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: marketplace-frontend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

---
# Frontend PDB
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: marketplace-frontend-pdb
  namespace: marketplace-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: marketplace-frontend

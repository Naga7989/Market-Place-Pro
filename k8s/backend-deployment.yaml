# =============================================================
# KUBERNETES BACKEND DEPLOYMENT + SERVICE + HPA
# India-First Enterprise Marketplace Platform
# Spring Boot Application
# =============================================================

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: marketplace-backend-sa
  namespace: marketplace-prod
  labels:
    app.kubernetes.io/name: marketplace-backend
    app.kubernetes.io/component: serviceaccount

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketplace-backend
  namespace: marketplace-prod
  labels:
    app.kubernetes.io/name: marketplace-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: kubectl
    app: marketplace-backend
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "Spring Boot REST API for BazaarIndia marketplace"
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: marketplace-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: marketplace-backend
        app.kubernetes.io/name: marketplace-backend
        app.kubernetes.io/component: backend
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
        checksum/config: "{{ .ConfigMapChecksum }}"
    spec:
      serviceAccountName: marketplace-backend-sa
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - marketplace-backend
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: marketplace-backend
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z marketplace-mysql-headless 3306; do
                echo "Waiting for MySQL..."; sleep 3;
              done
              echo "MySQL is ready!"
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z marketplace-redis-service 6379; do
                echo "Waiting for Redis..."; sleep 2;
              done
              echo "Redis is ready!"
      containers:
        - name: marketplace-backend
          image: ${ECR_REGISTRY}/marketplace/backend:${IMAGE_TAG:-latest}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: management
              containerPort: 8081
              protocol: TCP
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          envFrom:
            - configMapRef:
                name: marketplace-backend-config
          env:
            # Database credentials from Secret
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: marketplace-db-secret
                  key: mysql-user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: marketplace-db-secret
                  key: mysql-password
            # Redis password from Secret
            - name: SPRING_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: marketplace-redis-secret
                  key: redis-password
            # JWT Secret
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: marketplace-app-secret
                  key: jwt-secret
            # Razorpay
            - name: RAZORPAY_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: marketplace-payment-secret
                  key: razorpay-key-id
            - name: RAZORPAY_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: marketplace-payment-secret
                  key: razorpay-key-secret
            # Google Gemini
            - name: GOOGLE_GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: marketplace-ai-secret
                  key: gemini-api-key
            # Google OAuth
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: marketplace-oauth-secret
                  key: google-client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: marketplace-oauth-secret
                  key: google-client-secret
            # AWS
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: marketplace-aws-secret
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: marketplace-aws-secret
                  key: aws-secret-access-key
            # Twilio OTP
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: marketplace-sms-secret
                  key: twilio-account-sid
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: marketplace-sms-secret
                  key: twilio-auth-token
            - name: TWILIO_PHONE_NUMBER
              valueFrom:
                secretKeyRef:
                  name: marketplace-sms-secret
                  key: twilio-phone-number
            # Mail
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: marketplace-mail-secret
                  key: smtp-username
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: marketplace-mail-secret
                  key: smtp-password
            # Pod metadata
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          # Liveness probe — checks if the app is alive
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          # Readiness probe — checks if the app can serve traffic
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: management
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          # Startup probe — allows extra time during initial startup
          startupProbe:
            httpGet:
              path: /actuator/health
              port: management
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 12  # 12 * 10s = 2 minutes startup window
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
            - name: logs-dir
              mountPath: /app/logs
      volumes:
        - name: tmp-dir
          emptyDir: {}
        - name: logs-dir
          emptyDir: {}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      imagePullSecrets:
        - name: ecr-registry-secret

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: marketplace-backend-service
  namespace: marketplace-prod
  labels:
    app.kubernetes.io/name: marketplace-backend
    app.kubernetes.io/component: service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/actuator/prometheus"
    prometheus.io/port: "8081"
spec:
  selector:
    app: marketplace-backend
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: http
    - name: management
      protocol: TCP
      port: 8081
      targetPort: management
  sessionAffinity: None

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: marketplace-backend-hpa
  namespace: marketplace-prod
  labels:
    app.kubernetes.io/name: marketplace-backend
    app.kubernetes.io/component: hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: marketplace-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: marketplace-backend-pdb
  namespace: marketplace-prod
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: marketplace-backend

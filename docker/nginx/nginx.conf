# =============================================================
# NGINX REVERSE PROXY CONFIGURATION
# India-First Enterprise Marketplace Platform
# =============================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------
    # Logging
    # -------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   warn;

    # -------------------------------------------------------
    # Performance
    # -------------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    types_hash_max_size 4096;
    server_tokens       off;

    # -------------------------------------------------------
    # Buffer sizes
    # -------------------------------------------------------
    client_body_buffer_size   128k;
    client_max_body_size      50m;
    client_header_buffer_size   4k;
    large_client_header_buffers 4 16k;

    # -------------------------------------------------------
    # Timeouts
    # -------------------------------------------------------
    client_body_timeout    30s;
    client_header_timeout  30s;
    send_timeout           30s;
    proxy_connect_timeout  60s;
    proxy_send_timeout     60s;
    proxy_read_timeout    120s;

    # -------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # -------------------------------------------------------
    # Rate Limiting Zones
    # -------------------------------------------------------
    # General API rate limit: 60 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=api_limit:20m rate=60r/m;

    # Auth endpoints: 10 requests/minute per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # Upload endpoints: 5 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=upload_limit:5m rate=5r/m;

    # Search endpoints: 30 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=search_limit:10m rate=30r/m;

    # -------------------------------------------------------
    # Upstream Definitions
    # -------------------------------------------------------
    upstream backend_cluster {
        least_conn;
        server marketplace-backend:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream frontend_cluster {
        least_conn;
        server marketplace-frontend:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # -------------------------------------------------------
    # Security Headers Map
    # -------------------------------------------------------
    map $sent_http_content_type $expires {
        default                    off;
        text/html                  epoch;
        text/css                   max;
        application/javascript     max;
        ~image/                    30d;
        ~font/                     365d;
    }

    # -------------------------------------------------------
    # Main Server Block
    # -------------------------------------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Security headers
        add_header X-Frame-Options                "SAMEORIGIN"                always;
        add_header X-Content-Type-Options         "nosniff"                   always;
        add_header X-XSS-Protection               "1; mode=block"             always;
        add_header Referrer-Policy                "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy             "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security      "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.razorpay.com wss:; frame-src https://checkout.razorpay.com;" always;

        # Remove server version from headers
        more_clear_headers Server;

        # -------------------------------------------------------
        # Health check endpoint (nginx itself)
        # -------------------------------------------------------
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # -------------------------------------------------------
        # Static assets: cache aggressively
        # -------------------------------------------------------
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|webp|avif)$ {
            proxy_pass http://frontend_cluster;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # -------------------------------------------------------
        # Authentication API (strict rate limit)
        # -------------------------------------------------------
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend_cluster;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;

            proxy_cache_bypass $http_pragma;
            proxy_no_cache     $http_pragma;
        }

        # -------------------------------------------------------
        # Upload endpoints (file size + rate limit)
        # -------------------------------------------------------
        location /api/v1/upload/ {
            limit_req zone=upload_limit burst=2 nodelay;
            client_max_body_size 50m;

            proxy_pass         http://backend_cluster;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
            proxy_read_timeout 300s;
        }

        # -------------------------------------------------------
        # Search API (relaxed rate limit)
        # -------------------------------------------------------
        location /api/v1/search {
            limit_req zone=search_limit burst=15 nodelay;

            proxy_pass         http://backend_cluster;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # -------------------------------------------------------
        # REST API — all other endpoints
        # -------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend_cluster;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;

            # Response buffering
            proxy_buffering       on;
            proxy_buffer_size     8k;
            proxy_buffers        16 8k;
        }

        # -------------------------------------------------------
        # WebSocket proxy for real-time features (chat, tracking)
        # -------------------------------------------------------
        location /ws {
            proxy_pass         http://backend_cluster;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # -------------------------------------------------------
        # Spring Boot Actuator (internal only)
        # -------------------------------------------------------
        location /actuator/ {
            allow 172.20.0.0/16;   # docker internal network
            allow 10.0.0.0/8;      # private ranges
            deny  all;

            proxy_pass http://backend_cluster;
            proxy_set_header Host $host;
        }

        # -------------------------------------------------------
        # Next.js frontend — all other routes
        # -------------------------------------------------------
        location / {
            proxy_pass         http://frontend_cluster;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;

            # Support Next.js HMR WebSocket in development
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $http_upgrade;
        }

        # -------------------------------------------------------
        # Error pages
        # -------------------------------------------------------
        error_page 429 /429.html;
        error_page 502 503 504 /50x.html;

        location = /429.html {
            root /usr/share/nginx/html;
            internal;
        }

        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}

version: "3.9"

# =============================================================
# INDIA-FIRST ENTERPRISE MARKETPLACE PLATFORM
# Docker Compose - Local Development
# =============================================================

networks:
  marketplace-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  elasticsearch-data:
    driver: local
  nginx-logs:
    driver: local

services:

  # -----------------------------------------------------------
  # MySQL 8.0 - Primary Database
  # -----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: marketplace-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Marketplace@Root#2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-marketplace_db}
      MYSQL_USER: ${MYSQL_USER:-marketplace_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Marketplace@DB#2024}
      TZ: Asia/Kolkata
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/V2__seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./mysql/my.cnf:/etc/mysql/conf.d/marketplace.cnf:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=500
      --innodb_buffer_pool_size=512M
      --slow_query_log=1
      --slow_query_log_file=/var/log/mysql/slow.log
      --long_query_time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-Marketplace@Root#2024}"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - marketplace-net
    labels:
      com.marketplace.service: "database"
      com.marketplace.tier: "data"

  # -----------------------------------------------------------
  # Redis 7 - Cache, Sessions & Message Queue
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: marketplace-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-Marketplace@Redis#2024}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-Marketplace@Redis#2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - marketplace-net
    labels:
      com.marketplace.service: "cache"
      com.marketplace.tier: "data"

  # -----------------------------------------------------------
  # Elasticsearch 8.11 - Search Engine
  # -----------------------------------------------------------
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: marketplace-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx1g
      - cluster.name=marketplace-cluster
      - node.name=marketplace-node-1
      - bootstrap.memory_lock=true
      - "indices.query.bool.max_clause_count=4096"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - marketplace-net
    labels:
      com.marketplace.service: "search"
      com.marketplace.tier: "data"

  # -----------------------------------------------------------
  # Kibana 8.11 - Elasticsearch Dashboard
  # -----------------------------------------------------------
  kibana:
    image: kibana:8.11.0
    container_name: marketplace-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=marketplace-kibana
      - XPACK_SECURITY_ENABLED=false
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q 'available'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - marketplace-net
    labels:
      com.marketplace.service: "kibana"
      com.marketplace.tier: "monitoring"

  # -----------------------------------------------------------
  # Spring Boot Backend
  # -----------------------------------------------------------
  marketplace-backend:
    image: marketplace/backend:${APP_VERSION:-latest}
    container_name: marketplace-backend
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-marketplace_db}?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-marketplace_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-Marketplace@DB#2024}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-Marketplace@Redis#2024}
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      JWT_SECRET: ${JWT_SECRET:-SuperSecretJwtKey2024MarketplaceIndia}
      JWT_EXPIRATION_MS: 900000
      JWT_REFRESH_EXPIRATION_DAYS: 30
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      GOOGLE_GEMINI_API_KEY: ${GOOGLE_GEMINI_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-marketplace-uploads-dev}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      SPRING_MAIL_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SMTP_PORT:-587}
      SPRING_MAIL_USERNAME: ${SMTP_USERNAME}
      SPRING_MAIL_PASSWORD: ${SMTP_PASSWORD}
      TZ: Asia/Kolkata
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - marketplace-net
    labels:
      com.marketplace.service: "backend"
      com.marketplace.tier: "application"

  # -----------------------------------------------------------
  # Next.js Frontend
  # -----------------------------------------------------------
  marketplace-frontend:
    image: marketplace/frontend:${APP_VERSION:-latest}
    container_name: marketplace-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://nginx/api
      NEXT_PUBLIC_WS_URL: ws://nginx/ws
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      NEXT_PUBLIC_FIREBASE_CONFIG: ${FIREBASE_CONFIG}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-NextAuthSecretMarketplace2024}
      NEXTAUTH_URL: http://localhost
      TZ: Asia/Kolkata
    ports:
      - "3000:3000"
    depends_on:
      marketplace-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - marketplace-net
    labels:
      com.marketplace.service: "frontend"
      com.marketplace.tier: "application"

  # -----------------------------------------------------------
  # Nginx Reverse Proxy
  # -----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: marketplace-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      marketplace-backend:
        condition: service_healthy
      marketplace-frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - marketplace-net
    labels:
      com.marketplace.service: "proxy"
      com.marketplace.tier: "edge"
